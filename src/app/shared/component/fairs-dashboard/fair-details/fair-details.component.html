

<div class="fair">
    <figure class="banner"
    [ngStyle]="{
        'background-image':' linear-gradient(0deg, #000 10%, transparent), url('+fairObj.bannerUrl+') '
    }"
    >
        <!-- <img [src]="fairObj.bannerUrl"alt=""> -->

        <figcaption>
              <h4 class="mb-0">{{fairObj.fairName}}</h4>
    <div class="typeAnDate text-white">
        <p class="mb-0">
            Event Type:{{fairObj.type}}
        </p>
        <p class="mb-0">
         Date:{{fairObj.startDate * 1000 |date}}
        </p>
        </div>
        </figcaption>
    </figure>
    <div class="p-4">

    <p [innerHTML]="fairObj.candidateDescription"></p>
    <p [innerHTML]="fairObj.schoolDescription"></p>
    </div>
    
</div>
