<main class="main-auth">
    <ng-container *ngIf="!allreadyHasAccount">
       <div class="card">
        <div class="card-body">
            <h3>Sign Up</h3>
            <form [formGroup]="signUpForm" (ngSubmit)="onSignUp()">
                <div class="form-group">
                    <label for="email"><b>Email</b></label>
                    <input type="text"formControlName="email" class="form-control">
                </div>
                 <div class="form-group">
                    <label for="password"><b>Password</b></label>
                    <input type="text"formControlName="password" class="form-control">
                </div>
                  <div class="form-group">
                    <label for="userRole"><b>UserRole</b></label>
                   <select formControlName="userRole" class="form-control">
                        <option value="buyer">Buyer</option>
                        <option value="admin">Admin</option>
                        <option value="superAdmin">SuperAdmin</option>
                </select>
                </div>
                <button mat-raised-button color="primary" class="mt-2 w-100">Sign Up</button>

            </form>
            <a href="javascript:;"(click)="allreadyHasAccount=true">Already have account</a>
        </div>
       </div>
    </ng-container>

    <ng-container *ngIf="allreadyHasAccount">
        <div class="card">
            <div class="card-body">
                 <h3>Log In</h3>
                   <form [formGroup]="loginForm" class="mb-2" (ngSubmit)="onLogin()">
                <div class="form-group">
                    <label for="email"><b>Email</b></label>
                    <input type="text"formControlName="email" class="form-control">
                </div>

                 <div class="form-group">
                    <label for="password"><b>Password</b></label>
                    <input type="text"formControlName="password" class="form-control">
                </div>
                <button mat-raised-button color="primary" class="mt-2 w-100" >Log In</button>

                </form>
            <a href="javascript:;"(click)="allreadyHasAccount=false">Don't have account</a>

            </div>
        </div>

    </ng-container>



</main>
